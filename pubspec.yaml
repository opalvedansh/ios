name: customer_app
description: ZepWash customer mobile app
publish_to: 'none'
version: 1.0.1+10

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Shared package
  zepwash_common:
    path: packages/zepwash-common

  # MSG91 OTP
  sendotp_flutter_sdk: ^0.0.2

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  cloud_functions: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  firebase_crashlytics: ^4.0.0
  flutter_local_notifications: ^17.2.2

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Payment
  razorpay_flutter: ^1.3.6  # mobile only — excluded on web via conditional export

  # Geocoding
  geocoding: ^2.1.1
  geolocator: ^10.1.0

  # Images
  cached_network_image: ^3.3.0
  image_picker: ^1.0.5

  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6

  # Utilities
  collection: ^1.18.0
  intl: ^0.18.1
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  shared_preferences: ^2.2.2
  package_info_plus: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1
  very_good_analysis: ^5.1.0
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.1

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/logo_name.png
    - assets/images/header_logo.svg
